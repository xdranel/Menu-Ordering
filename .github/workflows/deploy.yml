name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/xdranel/menu-ordering:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/xdranel/menu-ordering:latest
            docker stop menu-app || true
            docker rm menu-app || true
            docker run -d \
              --name menu-app \
              --restart unless-stopped \
              --network proxy-net \
              --memory 768m \
              --cpus 1.0 \
              -e DB_URL=jdbc:mysql://menu-db:3306/restaurant_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true \
              -e SPRING_DATASOURCE_USERNAME=menuuser \
              -e SPRING_DATASOURCE_PASSWORD=somenewpassword123! \
              -e SPRING_FLYWAY_ENABLED=true \
              ghcr.io/xdranel/menu-ordering:latest

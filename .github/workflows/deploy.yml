name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/xdranel/menu-ordering:latest

      - name: Deploy
        run: |
          docker pull ghcr.io/xdranel/menu-ordering:latest
          docker stop menu-app || true
          docker rm menu-app || true
          cd /home/xdranel/projects/menu-ordering
          docker compose up -d --no-build menu-app
            --name menu-app \
            --restart unless-stopped \
            --network proxy-net \
            --memory 768m \
            --cpus 1.0 \
            -e DB_URL="jdbc:mysql://menu-db:3306/restaurant_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" \
            -e SPRING_DATASOURCE_USERNAME=menuuser \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e SPRING_FLYWAY_ENABLED=true \
            ghcr.io/xdranel/menu-ordering:latest